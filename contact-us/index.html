<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>
</head>
<body>

<h1>Contact Us</h1>

<form id="contactForm">

    <!-- ========================= -->
    <!-- PILIH AKSI -->
    <!-- ========================= -->

    <label>Pilih Aksi</label>
    <br>

    <select id="action" required>

        <option value="">
            -- Pilih Aksi --
        </option>

        <option value="Saran Fitur">
            Saran Fitur
        </option>

        <option value="Bug Report">
            Bug Report
        </option>

    </select>

    <br><br>

    <!-- ========================= -->
    <!-- PILIH GAME -->
    <!-- ========================= -->

    <label>Pilih Game</label>
    <br>

    <select id="game" required>

        <option value="">
            Loading game...
        </option>

    </select>

    <br><br>

    <!-- ========================= -->
    <!-- NAMA -->
    <!-- ========================= -->

    <label>Nama</label>
    <br>

    <input
        type="text"
        id="name"
        required
    >

    <br><br>

    <!-- ========================= -->
    <!-- EMAIL -->
    <!-- ========================= -->

    <label>Email</label>
    <br>

    <input
        type="email"
        id="email"
        required
    >

    <br><br>

    <!-- ========================= -->
    <!-- PESAN -->
    <!-- ========================= -->

    <label>Pesan</label>
    <br>

    <textarea
        id="message"
        rows="8"
        cols="40"
        required
    ></textarea>

    <br><br>

    <!-- ========================= -->
    <!-- IMAGE -->
    <!-- ========================= -->

    <label>Masukan Gambar (Opsional)</label>
    <br>

    <input
        type="file"
        id="image"
        accept="image/*"
    >

    <br><br>

    <!-- ========================= -->
    <!-- BUTTON -->
    <!-- ========================= -->

    <div
        class="cf-turnstile"
        data-sitekey="0x4AAAAAADZEfJ_y69ct0l2O"
        data-callback="turnstileSuccess">
    </div>

    <br>

    <button
        type="submit"
        id="submitBtn"
        disabled>
        
        Kirim

    </button>
    
</form>

<p id="status"></p>

<script
src="https://challenges.cloudflare.com/turnstile/v0/api.js"
async
defer>
</script>
<script
type="module"
src="scripts/contact_us.js"
defer>
</script>

</body>
</html>
