<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>
</head>
<body>

<h1>Contact Us</h1>

<form id="contactForm">

    <!-- ========================= -->
    <!-- PILIH AKSI -->
    <!-- ========================= -->

    <label>Pilih Aksi</label>
    <br>

    <select id="action" required>

        <option value="">
            -- Pilih Aksi --
        </option>

        <option value="Saran Fitur">
            Saran Fitur
        </option>

        <option value="Bug Report">
            Bug Report
        </option>

    </select>

    <br><br>

    <!-- ========================= -->
    <!-- PILIH GAME -->
    <!-- ========================= -->

    <label>Pilih Game</label>
    <br>

    <select id="game" required>

        <option value="">
            Loading game...
        </option>

    </select>

    <br><br>

    <!-- ========================= -->
    <!-- NAMA -->
    <!-- ========================= -->

    <label>Nama</label>
    <br>

    <input
        type="text"
        id="name"
        required
    >

    <br><br>

    <!-- ========================= -->
    <!-- EMAIL -->
    <!-- ========================= -->

    <label>Email</label>
    <br>

    <input
        type="email"
        id="email"
        required
    >

    <br><br>

    <!-- ========================= -->
    <!-- PESAN -->
    <!-- ========================= -->

    <label>Pesan</label>
    <br>

    <textarea
        id="message"
        rows="8"
        cols="40"
        required
    ></textarea>

    <br><br>

    <!-- ========================= -->
    <!-- IMAGE -->
    <!-- ========================= -->

    <label>Masukan Gambar (Opsional)</label>
    <br>

    <input
        type="file"
        id="image"
        accept="image/*"
    >

    <br><br>

    <!-- ========================= -->
    <!-- BUTTON -->
    <!-- ========================= -->

    <div
        class="cf-turnstile"
        data-sitekey="SITE_KEY_KAMU"
        data-callback="turnstileSuccess">
    </div>

    <br>

    <button
        type="submit"
        id="submitBtn"
        disabled>

        Kirim

    </button>
    
</form>

<p id="status"></p>

<script>

// =====================================
// API GAME LIST
// =====================================

const GAME_API =
    "https://ayydev-games-api.akunffbya.workers.dev";

// =====================================
// DISCORD WEBHOOK
// =====================================

const WEBHOOK_URL =
    "https://discord.com/api/webhooks/1509877286076153876/3mZG04i2CXJm51U5LCFCtgnoWnrJFnyKiDFMdr2NvyUPtAWsiYzc6OyC-VMrcP935Cry";

// =====================================
// ELEMENT
// =====================================

const gameSelect =
    document.getElementById("game");

const form =
    document.getElementById("contactForm");

const statusText =
    document.getElementById("status");

let turnstileVerified = false;

function turnstileSuccess() {

    turnstileVerified = true;

    document
        .getElementById(
            "submitBtn"
        )
        .disabled = false;
}

// =====================================
// LOAD GAMES
// =====================================

async function loadGames(){

    try {

        const response =
            await fetch(
                `${GAME_API}?time=${Date.now()}`
            );

        const games =
            await response.json();

        gameSelect.innerHTML =
            `
            <option value="">
                -- Pilih Game --
            </option>
            `;

        games.forEach(game => {

            gameSelect.innerHTML += `

                <option value="${game.title}">

                    ${game.title}

                </option>
            `;
        });

    } catch(err) {

        console.error(err);

        gameSelect.innerHTML =
            `
            <option>
                Gagal memuat game
            </option>
            `;
    }
}

// =====================================
// SUBMIT FORM
// =====================================

form.addEventListener(
    "submit",
    async (e) => {

    e.preventDefault();

    statusText.innerText =
        "Mengirim...";

    try {

        // =========================
        // GET VALUES
        // =========================

        const action =
            document.getElementById("action")
            .value;

        const game =
            document.getElementById("game")
            .value;

        const name =
            document.getElementById("name")
            .value;

        const email =
            document.getElementById("email")
            .value;

        const message =
            document.getElementById("message")
            .value;

        const imageFile =
            document.getElementById("image")
            .files[0];

        // =========================
        // FORM DATA
        // =========================

        const formData =
            new FormData();

        formData.append(

            "payload_json",

            JSON.stringify({

                content:

        `📩 CONTACT US

🎯 Aksi:
${action}

🎮 Game:
${game}

👤 Nama:
${name}

📧 Email:
${email}

💬 Pesan:
${message}`
            })
        );

        // =========================
        // ATTACH IMAGE
        // =========================

        if (imageFile) {

            formData.append(

                "files[0]",

                imageFile
            );
        }

        // =========================
        // SEND WEBHOOK
        // =========================

        await fetch(

            WEBHOOK_URL,

            {

                method: "POST",

                body: formData
            }
        );

        statusText.innerText =
            "Berhasil dikirim!";

        form.reset();

    } catch(err) {

        console.error(err);

        statusText.innerText =
            "Gagal mengirim.";
    }
});

// =====================================
// START
// =====================================

loadGames();

src="https://challenges.cloudflare.com/turnstile/v0/api.js"
async
defer>

</script>

</body>
</html>
