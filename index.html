<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AyyDev Profile Info</title>

  <style>
    /* =========================
       RESET
    ========================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {

      --bg-color: #0f172a;
      --card-color: #1e293b;

      --primary-color: #3b82f6;
      --primary-hover: #2563eb;

      --special-primary-color: #047857;
      --special-primary-hover: #065f46;

      --text-color: #ffffff;
      --subtext-color: #cbd5e1;

      --soft-color: rgba(255,255,255,0.08);
      --soft-hover: rgba(255,255,255,0.15);

      --border-radius: 16px;
      --transition-speed: 0.2s;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);

      min-height: 100vh;

      display: flex;
      justify-content: center;

      padding: 20px;
    }

    /* =========================
       PAGE
    ========================== */
    .page {
      width: 100%;
      max-width: 500px;
      display: none;
    }

    .page.active {
      display: block;
    }

    /* =========================
       CONTAINER
    ========================== */
    .container {
      background: var(--card-color);

      border-radius: var(--border-radius);

      padding: 32px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* =========================
       HEADER
    ========================== */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-icon {
      width: 90px;
      height: 90px;

      border-radius: 50%;
      object-fit: cover;

      margin-bottom: 18px;

      border: 3px solid rgba(255,255,255,0.15);
    }

    .title {
      font-size: 32px;
      font-weight: bold;

      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--subtext-color);

      line-height: 1.5;
    }

    /* =========================
       BUTTON LIST
    ========================== */
    .button-list {
      display: flex;
      flex-direction: column;
      gap: 15px;

      margin-bottom: 30px;
    }

    .link-button,
    .special-link-button {
      display: block;

      width: 100%;
      padding: 15px;

      border: none;
      border-radius: 12px;

      text-align: center;
      text-decoration: none;

      color: white;

      font-size: 16px;
      font-weight: 600;

      cursor: pointer;

      -webkit-tap-highlight-color: transparent;

      transition:
        transform var(--transition-speed),
        background var(--transition-speed);
    }

    .link-button {
      background: var(--primary-color);
    }

    .link-button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .special-link-button {
      background: var(--special-primary-color);
    }

    .special-link-button:hover {
      background: var(--special-primary-hover);
      transform: translateY(-2px);
    }

    .link-button:active,
    .special-link-button:active {
      transform: scale(0.98);
    }

    /* =========================
       SOCIAL MEDIA
    ========================== */
    .social-section {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;

      margin-bottom: 25px;
    }

    .social-link {
      width: 50px;
      height: 50px;

      display: flex;
      justify-content: center;
      align-items: center;

      background: var(--soft-color);

      border-radius: 12px;

      text-decoration: none;

      transition:
        transform var(--transition-speed),
        background var(--transition-speed);
    }

    .social-link:hover {
      background: var(--soft-hover);
      transform: translateY(-3px);
    }

    .social-icon {
      width: 26px;
      height: 26px;
    }

    /* =========================
       COPYRIGHT
    ========================== */
    .copyright {
      text-align: center;
    }

    .copyright-link {
      color: var(--subtext-color);

      text-decoration: none;

      font-size: 14px;
    }

    .copyright-link:hover {
      color: white;
    }

    /* =========================
       GAMES HEADER
    ========================== */
    .games-header {
      display: flex;
      align-items: center;
      gap: 15px;

      margin-bottom: 25px;
    }

    .back-button {
      width: 45px;
      height: 45px;

      border: none;
      border-radius: 12px;

      background: var(--soft-color);
      color: white;

      font-size: 20px;

      cursor: pointer;

      transition: background var(--transition-speed);
    }

    .back-button:hover {
      background: var(--soft-hover);
    }

    .games-title {
      font-size: 24px;
      font-weight: bold;
    }

    /* =========================
       GAME LIST
    ========================== */
    .games-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      overflow: hidden;

      background: rgba(255,255,255,0.04);

      border-radius: 16px;
    }

    .card img {
      width: 100%;
      height: 220px;

      object-fit: cover;

      display: block;
    }

    .content {
      padding: 18px;
    }

    .content h2 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .content p {
      color: var(--subtext-color);
      line-height: 1.6;

      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;

      padding: 12px 18px;

      border-radius: 12px;

      background: var(--primary-color);
      color: white;

      text-decoration: none;
      font-weight: bold;

      transition: background var(--transition-speed);
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    /* =========================
       RESPONSIVE
    ========================== */
    @media (max-width: 480px) {

      .container {
        padding: 24px;
      }

      .title {
        font-size: 28px;
      }

      .header-icon {
        width: 80px;
        height: 80px;
      }

      .content h2 {
        font-size: 20px;
      }

    }
  </style>
</head>

<body>

  <!-- =========================
       HOME PAGE
  ========================== -->
  <section
    class="page active"
    id="home-page"
  >

    <main class="container">

      <!-- HEADER -->
      <section class="header">

        <img
          class="header-icon"
          src="https://files.catbox.moe/ewikud.png"
          alt="Profile Icon"
        />

        <h1 class="title">
          AyyDev
        </h1>

        <p class="subtitle">
          Unlimited Creation!
        </p>

      </section>

      <!-- BUTTON LIST -->
      <section class="button-list">

        <a
          class="special-link-button"
          href="https://sociabuzz.com/ariyaxyz/donate"
          target="_blank"
        >
          Donate
        </a>

        <!-- GAMES BUTTON -->
        <button
          class="link-button"
          onclick="openGamesPage()"
        >
          Games
        </button>

      </section>

      <!-- SOCIAL -->
      <section class="social-section">

        <a
          class="social-link"
          href="https://www.instagram.com/ayydevofc"
          target="_blank"
        >
          <img
            class="social-icon"
            src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
            alt="Instagram"
          />
        </a>

        <a
          class="social-link"
          href="https://youtube.com/ayydev221"
          target="_blank"
        >
          <img
            class="social-icon"
            src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"
            alt="YouTube"
          />
        </a>

        <a
          class="social-link"
          href="https://github.com/AyyDev-hub"
          target="_blank"
        >
          <img
            class="social-icon"
            src="https://cdn-icons-png.flaticon.com/512/733/733553.png"
            alt="GitHub"
          />
        </a>

      </section>

      <!-- COPYRIGHT -->
      <section class="copyright">

        <a
          class="copyright-link"
          href="https://id.wikipedia.org/wiki/Hak_cipta"
          target="_blank"
        >
          ©2026 by AyyDev
        </a>

      </section>

    </main>

  </section>

  <!-- =========================
       GAMES PAGE
  ========================== -->
  <section
    class="page"
    id="games-page"
  >

    <main class="container">

      <!-- GAMES HEADER -->
      <section class="games-header">

        <button
          class="back-button"
          onclick="backToHome()"
        >
          ❮
        </button>

        <h1 class="games-title">
          AyyDev Games
        </h1>

      </section>

      <!-- GAMES LIST -->
      <section
        class="games-list"
        id="games"
      >

        <p>Loading games...</p>

      </section>

    </main>

  </section>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script>

    const homePage =
      document.getElementById("home-page");

    const gamesPage =
      document.getElementById("games-page");

    function openGamesPage() {

      homePage.classList.remove("active");
      gamesPage.classList.add("active");

      loadGames();
    }

    function backToHome() {

      gamesPage.classList.remove("active");
      homePage.classList.add("active");
    }

    async function loadGames() {

      const games =
        document.getElementById("games");

      games.innerHTML =
        "<p>Loading games...</p>";

      try {

        const response =
          await fetch(
            `https://ayydev-games-api.akunffbya.workers.dev?time=${Date.now()}`
          );

        const data =
          await response.json();

        console.log(data);

        if (!Array.isArray(data)) {

          games.innerHTML =
            "<p>Data game invalid.</p>";

          return;
        }

        games.innerHTML = "";

        data.forEach(game => {

          games.innerHTML += `

            <div class="card">

              <img
                src="${game.image}"
                alt="${game.title}"
              >

              <div class="content">

                <h2>
                  ${game.title}
                </h2>

                <p>
                  ${game.description}
                </p>

                <a
                  class="btn"
                  href="${game.link}"
                  target="_blank"
                >
                  Play Game
                </a>

              </div>

            </div>

          `;
        });

      } catch(err) {

        console.error(err);

        games.innerHTML =
          "<p>Gagal mengambil game.</p>";
      }
    }

  </script>

</body>
</html>
